<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-topbar title="Dashboard"></app-topbar>
            <div class="content-area">
                <div class="stats-grid">
                    <div class="stat-card highlight-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <h3>Total de Motoristas</h3><p id="total-drivers">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #10b981; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2);"><i class="fas fa-truck"></i></div>
                        <div class="stat-info">
                            <h3>Total de Viagens</h3><p id="total-trips">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #f59e0b; background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2);"><i class="fas fa-gas-pump"></i></div>
                        <div class="stat-info">
                            <h3>Média Geral KM/L</h3><p id="avg-economy">0.00</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #8b5cf6; background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.2);"><i class="fas fa-crown"></i></div>
                        <div class="stat-info">
                            <h3>Motorista Destaque</h3><p id="top-driver" style="font-size: 1.2rem;">-</p>
                        </div>
                    </div>
                </div>
                <div class="table-card full-width">
                    <h3><i class="fas fa-history"></i> Últimas Viagens</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr><th>Motorista</th><th>Distância (Km)</th><th>KM/L</th><th>Litros</th><th>Data Início</th></tr>
                            </thead>
                            <tbody id="recent-trips"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/utils.js"></script><script src="js/config.js"></script><script src="js/app.js"></script>
    <script src="js/settings.js"></script><script src="js/trips.js"></script><script src="js/drivers.js"></script>
    <script src="js/cavalos.js"></script><script src="js/ocorrencias.js"></script><script src="js/ranking.js"></script>
</body>
</html>
