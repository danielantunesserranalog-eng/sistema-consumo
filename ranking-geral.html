<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Geral - Sistema de Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <app-sidebar></app-sidebar>
        <main class="main-content">
            <app-topbar title="Ranking Geral"></app-topbar>
            <div class="content-area">
                <div class="table-card full-width" style="background: linear-gradient(to bottom, #1e293b, #0f172a);">
                    <h3 style="justify-content: center; font-size: 1.5rem; margin-bottom: 10px; color: #fbbf24;">
                        <i class="fas fa-globe"></i> Ranking Geral (Global)
                    </h3>
                    <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">
                        Soma de toda a quilometragem e médias de todos os meses. Ocorrências não desclassificam neste modo.
                    </p>
                    <div id="ranking-geral-list"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/menu.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/trips.js"></script>
    <script src="js/drivers.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ranking-geral.js"></script>
</body>
</html>
